<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crucible</title>
<style>
  :root { --bg: #0a0a0a; --surface: #111; --border: #222; --accent: #c0392b; --text: #e0e0e0; --dim: #666; --green: #27ae60; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header h1 { color: var(--accent); font-size: 1.2rem; letter-spacing: 4px; }
  #status-bar { display: flex; gap: 16px; font-size: 0.7rem; color: var(--dim); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); display: inline-block; margin-right: 4px; }
  .dot.on { background: var(--green); }
  #brain-select { margin-left: auto; background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 4px 8px; font-family: monospace; font-size: 0.8rem; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 4px; font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .msg.user { background: #1a1a2e; border: 1px solid #333; align-self: flex-end; color: #a0c4ff; }
  .msg.ai { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; }
  .msg .brain-tag { font-size: 0.7rem; color: var(--accent); margin-bottom: 4px; }
  .msg.thinking { color: var(--dim); font-style: italic; }
  #input-area { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  #input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px; font-family: monospace; font-size: 0.85rem; resize: none; height: 44px; }
  #input:focus { outline: none; border-color: var(--accent); }
  button { background: var(--accent); color: white; border: none; padding: 0 16px; font-family: monospace; cursor: pointer; font-size: 0.85rem; }
  button:hover { opacity: 0.85; }
  #tabs { display: flex; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 16px; cursor: pointer; font-size: 0.8rem; color: var(--dim); border-bottom: 2px solid transparent; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  #shell-area { display: none; flex-direction: column; flex: 1; padding: 16px; gap: 8px; }
  #shell-area.active { display: flex; }
  #chat-area { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  #shell-input { background: var(--surface); border: 1px solid var(--border); color: var(--green); padding: 8px; font-family: monospace; font-size: 0.8rem; }
  #shell-output { flex: 1; overflow-y: auto; background: #050505; border: 1px solid var(--border); padding: 8px; font-size: 0.75rem; color: var(--green); white-space: pre-wrap; }
</style>
</head>
<body>
<header>
  <h1>⚒ CRUCIBLE</h1>
  <div id="status-bar">
    <span><span class="dot" id="local-dot"></span>local</span>
    <span><span class="dot on"></span>gemini</span>
  </div>
  <select id="brain-select">
    <option value="auto">auto</option>
    <option value="gemini">gemini</option>
    <option value="local">local</option>
  </select>
</header>
<div id="tabs">
  <div class="tab active" onclick="switchTab('chat')">chat</div>
  <div class="tab" onclick="switchTab('shell')">shell</div>
</div>
<div id="chat-area">
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="input" placeholder="Message Crucible..." onkeydown="handleKey(event)"></textarea>
    <button onclick="sendMessage()">send</button>
  </div>
</div>
<div id="shell-area">
  <input id="shell-input" placeholder="$ command" onkeydown="shellKey(event)">
  <div id="shell-output">Crucible Shell ready.\n</div>
</div>
<script>
  let history = [];

  async function loadStatus() {
    try {
      const r = await fetch('/status');
      const d = await r.json();
      document.getElementById('local-dot').className = 'dot ' + (d.local_server ? 'on' : '');
    } catch(e) {}
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (tab==='chat')));
    document.getElementById('chat-area').style.display = tab === 'chat' ? 'flex' : 'none';
    document.getElementById('shell-area').classList.toggle('active', tab === 'shell');
  }

  function addMsg(content, role, brain='') {
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    if (brain) el.innerHTML = '<div class="brain-tag">[' + brain + ']</div>' + content.replace(/</g,'el.innerHTML = `<div class="brain-tag">[${brain}]</div>${content}`;lt;').replace(/>/g,'el.innerHTML = `<div class="brain-tag">[${brain}]</div>${content}`;gt;');
    else el.textContent = content;
    document.getElementById('messages').appendChild(el);
    el.scrollIntoView();
    return el;
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    const brain = document.getElementById('brain-select').value;
    addMsg(msg, 'user');
    history.push({role: 'user', content: msg});
    const thinking = addMsg('thinking...', 'ai thinking');
    try {
      const r = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg, brain, history: history.slice(0,-1)})
      });
      const d = await r.json();
      thinking.remove();
      addMsg(d.reply, 'ai', d.brain);
      history.push({role: 'assistant', content: d.reply});
    } catch(e) {
      thinking.textContent = 'Error: ' + e.message;
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  async function shellKey(e) {
    if (e.key !== 'Enter') return;
    const cmd = e.target.value.trim();
    if (!cmd) return;
    e.target.value = '';
    const out = document.getElementById('shell-output');
    out.textContent += '$ ' + cmd + '\n';
    try {
      const r = await fetch('/shell', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({command: cmd})
      });
      const d = await r.json();
      out.textContent += d.output + '\n';
    } catch(e) { out.textContent += 'Error\n'; }
    out.scrollTop = out.scrollHeight;
  }

  loadStatus();
  setInterval(loadStatus, 10000);
</script>
</body>
</html>
